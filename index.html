<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#000000" />
  <title>Black Screen Recorder</title>
  <style>
    :root{
      --bg:#000;
      --card:rgba(255,255,255,.06);
      --line:rgba(255,255,255,.10);
      --muted:rgba(255,255,255,.55);
      --text:#fff;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
    html,body{margin:0;height:100%;background:#000;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,Arial,sans-serif;overflow:hidden}
    body.noscroll{overflow:hidden;position:fixed;width:100%}
    .app{min-height:100dvh;background:radial-gradient(circle at top, rgba(255,255,255,.10), transparent 30%), #000;}
    .shell{max-width:460px;margin:0 auto;min-height:100dvh;padding:20px 18px calc(20px + env(safe-area-inset-bottom));display:flex;flex-direction:column}
    .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:34px}
    .eyebrow{font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:rgba(255,255,255,.4)}
    .title{font-size:24px;font-weight:600;margin-top:6px}
    .icon-btn{
      width:46px;height:46px;border-radius:999px;border:1px solid var(--line);
      background:rgba(255,255,255,.05);color:#fff;font-size:20px;cursor:pointer
    }
    .center{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:26px}
    .record-btn{
      width:210px;height:210px;border-radius:999px;border:1px solid rgba(255,255,255,.15);
      background:rgba(255,255,255,.05);color:#fff;cursor:pointer;position:relative;
      box-shadow:0 25px 80px rgba(0,0,0,.45)
    }
    .record-btn:before{
      content:"";position:absolute;inset:18px;border-radius:999px;border:1px solid rgba(255,255,255,.10)
    }
    .record-btn .play{
      width:68px;height:68px;border-radius:999px;background:#fff;color:#000;
      display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 14px
    }
    .record-btn .label{font-size:15px;font-weight:500}
    .grid{width:100%;display:grid;gap:12px}
    .card{
      border:1px solid var(--line);background:var(--card);border-radius:26px;
      backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)
    }
    .card-pad{padding:14px}
    .stats{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .stat{
      border:1px solid var(--line);background:rgba(0,0,0,.28);border-radius:20px;padding:12px
    }
    .stat .k{font-size:12px;color:rgba(255,255,255,.45)}
    .stat .v{font-size:15px;font-weight:600;margin-top:4px}
    .note{margin-top:24px;text-align:center;font-size:12px;color:rgba(255,255,255,.35)}
    .overlay{position:fixed;inset:0;background:#000;display:none}
    .overlay.active{display:block}
    .modal-wrap{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:flex-end;justify-content:center;padding:14px}
    .modal-wrap.open{display:flex}
    .modal{
      width:min(460px,100%);background:#070707;border:1px solid var(--line);border-radius:28px;padding:18px 16px 16px
    }
    .modal h2{margin:0;font-size:22px}
    .muted{color:var(--muted);font-size:14px;margin-top:6px}
    .field{margin-top:16px}
    label{display:block;font-size:14px;margin-bottom:8px}
    select,input[type="range"]{
      width:100%;border-radius:18px;border:1px solid var(--line);background:rgba(255,255,255,.05);color:#fff;
      padding:12px 14px;font-size:15px
    }
    .row{
      display:flex;align-items:center;justify-content:space-between;gap:14px;
      border:1px solid var(--line);background:rgba(255,255,255,.05);border-radius:18px;padding:14px
    }
    .save-btn{
      width:100%;margin-top:18px;border:none;border-radius:18px;padding:14px 16px;
      background:#fff;color:#000;font-size:15px;font-weight:600;cursor:pointer
    }
    .status{font-size:14px;color:rgba(255,255,255,.82)}
    .err{color:#ffb4b4}
    .hidden{display:none}
    .switch{position:relative;width:52px;height:32px}
    .switch input{display:none}
    .slider{
      position:absolute;inset:0;border-radius:999px;background:#2a2a2a;transition:.2s
    }
    .slider:before{
      content:"";position:absolute;width:26px;height:26px;left:3px;top:3px;border-radius:999px;background:#fff;transition:.2s
    }
    .switch input:checked + .slider{background:#4b4b4b}
    .switch input:checked + .slider:before{transform:translateX(20px)}
    .countdown{
      position:fixed;inset:0;display:none;align-items:center;justify-content:center;
      background:rgba(0,0,0,.45);font-size:78px;font-weight:700;z-index:99
    }
    .countdown.show{display:flex}
    .blackscreen{
      position:fixed;inset:0;background:#000;display:none;z-index:100;
      cursor:pointer;
    }
    .blackscreen.show{display:block}
    .hint{
      position:fixed;left:50%;bottom:18px;transform:translateX(-50%);
      color:rgba(255,255,255,.16);font-size:11px;letter-spacing:.06em;user-select:none
    }
  </style>
</head>
<body>
  <div class="app" id="homeScreen">
    <div class="shell">
      <div class="top">
        <div>
          <div class="eyebrow">Recorder</div>
          <div class="title">Black Screen Capture</div>
        </div>
        <button class="icon-btn" id="openSettings" aria-label="Settings">⚙️</button>
      </div>

      <div class="center">
        <button class="record-btn" id="startBtn">
          <div class="play">▶</div>
          <div class="label">Start Recording</div>
        </button>

        <div class="grid">
          <div class="card card-pad">
            <div class="stats">
              <div class="stat"><div class="k">Quality</div><div class="v" id="sQuality">1080p</div></div>
              <div class="stat"><div class="k">FPS</div><div class="v" id="sFps">30</div></div>
              <div class="stat"><div class="k">Zoom</div><div class="v" id="sZoom">x1.0</div></div>
              <div class="stat"><div class="k">Camera</div><div class="v" id="sCamera">Back</div></div>
            </div>
          </div>
          <div class="card card-pad hidden" id="statusCard"><div class="status" id="statusText"></div></div>
        </div>
      </div>

      <div class="note">Triple-tap the black screen to stop recording.</div>
    </div>
  </div>

  <div class="modal-wrap" id="settingsModal">
    <div class="modal">
      <h2>Settings</h2>
      <div class="muted">MP4 is used when the browser supports it. Otherwise it falls back automatically.</div>

      <div class="field">
        <label for="quality">Quality</label>
        <select id="quality">
          <option value="720p">720p</option>
          <option value="1080p" selected>1080p</option>
          <option value="4k">4K</option>
        </select>
      </div>

      <div class="field">
        <label for="fps">FPS</label>
        <select id="fps">
          <option value="24">24</option>
          <option value="30" selected>30</option>
          <option value="60">60</option>
        </select>
      </div>

      <div class="field">
        <label for="cameraMode">Camera</label>
        <select id="cameraMode">
          <option value="environment" selected>Back Camera</option>
          <option value="user">Front Camera</option>
        </select>
      </div>

      <div class="field">
        <label for="zoom">Zoom: <span id="zoomValue">1.0</span>x</label>
        <input type="range" id="zoom" min="1" max="5" step="0.1" value="1" />
      </div>

      <div class="field">
        <div class="row">
          <div>
            <div style="font-weight:600">Include audio</div>
            <div class="muted" style="margin-top:4px">Microphone recording</div>
          </div>
          <label class="switch">
            <input type="checkbox" id="includeAudio" checked />
            <span class="slider"></span>
          </label>
        </div>
      </div>

      <button class="save-btn" id="saveSettings">Save Settings</button>
    </div>
  </div>

  <div class="countdown" id="countdown"></div>
  <div class="blackscreen" id="blackscreen"><div class="hint"></div></div>

  <script>
    const STORAGE_KEY = "stealth-recorder-settings-v2";
    const defaultSettings = {
      quality: "1080p",
      fps: "30",
      zoom: 1,
      cameraMode: "environment",
      includeAudio: true
    };

    const qualityMap = {
      "720p": { width: { ideal: 1280 }, height: { ideal: 720 } },
      "1080p": { width: { ideal: 1920 }, height: { ideal: 1080 } },
      "4k": { width: { ideal: 3840 }, height: { ideal: 2160 } }
    };

    let settings = loadSettings();
    let mediaRecorder = null;
    let stream = null;
    let chunks = [];
    let recording = false;
    let tapCount = 0;
    let tapTimer = null;
    let stopRequested = false;
    let wakeLock = null;

    const openSettingsBtn = document.getElementById("openSettings");
    const settingsModal = document.getElementById("settingsModal");
    const saveSettingsBtn = document.getElementById("saveSettings");
    const startBtn = document.getElementById("startBtn");
    const blackscreen = document.getElementById("blackscreen");
    const countdown = document.getElementById("countdown");
    const statusCard = document.getElementById("statusCard");
    const statusText = document.getElementById("statusText");

    const qualityEl = document.getElementById("quality");
    const fpsEl = document.getElementById("fps");
    const cameraEl = document.getElementById("cameraMode");
    const zoomEl = document.getElementById("zoom");
    const zoomValue = document.getElementById("zoomValue");
    const audioEl = document.getElementById("includeAudio");

    function loadSettings() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? { ...defaultSettings, ...JSON.parse(raw) } : { ...defaultSettings };
      } catch {
        return { ...defaultSettings };
      }
    }

    function saveSettings() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(settings));
    }

    function renderSettings() {
      qualityEl.value = settings.quality;
      fpsEl.value = settings.fps;
      cameraEl.value = settings.cameraMode;
      zoomEl.value = settings.zoom;
      zoomValue.textContent = Number(settings.zoom).toFixed(1);
      audioEl.checked = settings.includeAudio;

      document.getElementById("sQuality").textContent = settings.quality;
      document.getElementById("sFps").textContent = settings.fps;
      document.getElementById("sZoom").textContent = "x" + Number(settings.zoom).toFixed(1);
      document.getElementById("sCamera").textContent = settings.cameraMode === "user" ? "Front" : "Back";
    }

    function setStatus(text, isError = false) {
      statusCard.classList.remove("hidden");
      statusText.textContent = text;
      statusText.className = isError ? "status err" : "status";
    }

    function hideStatus() {
      statusCard.classList.add("hidden");
    }

    function getRecorderFormat() {
      const preferred = [
        { mimeType: "video/mp4;codecs=h264,aac", ext: "mp4" },
        { mimeType: "video/mp4", ext: "mp4" },
        { mimeType: "video/webm;codecs=vp9,opus", ext: "webm" },
        { mimeType: "video/webm;codecs=vp8,opus", ext: "webm" },
        { mimeType: "video/webm", ext: "webm" }
      ];

      for (const item of preferred) {
        try {
          if (window.MediaRecorder && MediaRecorder.isTypeSupported && MediaRecorder.isTypeSupported(item.mimeType)) {
            return item;
          }
        } catch {}
      }
      return { mimeType: "", ext: "webm" };
    }

    async function enterFullscreen() {
      const el = document.documentElement;
      try {
        if (document.fullscreenElement) return true;
        if (el.requestFullscreen) {
          await el.requestFullscreen({ navigationUI: "hide" }).catch(() => el.requestFullscreen());
          return true;
        }
      } catch {}
      return false;
    }

    async function lockWake() {
      try {
        if ("wakeLock" in navigator) {
          wakeLock = await navigator.wakeLock.request("screen");
        }
      } catch {}
    }

    async function releaseWake() {
      try {
        if (wakeLock) await wakeLock.release();
      } catch {}
      wakeLock = null;
    }

    async function applyZoom(track) {
      if (!track || !track.getCapabilities) return;
      try {
        const capabilities = track.getCapabilities();
        if (!capabilities.zoom) return;
        const min = capabilities.zoom.min ?? 1;
        const max = capabilities.zoom.max ?? settings.zoom;
        const value = Math.min(max, Math.max(min, Number(settings.zoom)));
        await track.applyConstraints({ advanced: [{ zoom: value }] });
      } catch {}
    }

    async function createStream() {
      const videoConstraints = {
        ...qualityMap[settings.quality],
        frameRate: { ideal: Number(settings.fps) },
        facingMode: settings.cameraMode
      };

      const s = await navigator.mediaDevices.getUserMedia({
        video: videoConstraints,
        audio: settings.includeAudio
      });

      const track = s.getVideoTracks?.()[0];
      await applyZoom(track);
      return s;
    }

    function cleanupStream() {
      if (stream) {
        stream.getTracks().forEach(track => track.stop());
        stream = null;
      }
    }

    async function showCountdown() {
      for (let i = 3; i > 0; i--) {
        countdown.textContent = i;
        countdown.classList.add("show");
        await new Promise(r => setTimeout(r, 320));
      }
      countdown.classList.remove("show");
    }

    async function startRecording() {
      hideStatus();

      if (!navigator.mediaDevices?.getUserMedia || typeof MediaRecorder === "undefined") {
        setStatus("This browser does not support camera recording here.", true);
        return;
      }

      try {
        document.body.classList.add("noscroll");
        await enterFullscreen();
        await lockWake();
        await showCountdown();

        chunks = [];
        stopRequested = false;
        cleanupStream();

        stream = await createStream();

        const recorderFormat = getRecorderFormat();
        mediaRecorder = recorderFormat.mimeType
          ? new MediaRecorder(stream, { mimeType: recorderFormat.mimeType })
          : new MediaRecorder(stream);

        mediaRecorder._ext = recorderFormat.ext;

        mediaRecorder.ondataavailable = (e) => {
          if (e.data && e.data.size > 0) chunks.push(e.data);
        };

        mediaRecorder.onstop = () => finalizeRecording();

        mediaRecorder.onerror = () => {
          recording = false;
          blackscreen.classList.remove("show");
          document.body.classList.remove("noscroll");
          setStatus("Recording failed. Try lower quality or FPS.", true);
          cleanupStream();
          releaseWake();
        };

        mediaRecorder.start(1000);
        recording = true;
        blackscreen.classList.add("show");
      } catch (err) {
        document.body.classList.remove("noscroll");
        setStatus(err?.message || "Could not access camera or microphone.", true);
        cleanupStream();
        releaseWake();
      }
    }

    async function stopRecording() {
      if (!mediaRecorder || stopRequested) return;
      stopRequested = true;
      recording = false;
      blackscreen.classList.remove("show");
      document.body.classList.remove("noscroll");
      try {
        if (mediaRecorder.state !== "inactive") {
          mediaRecorder.stop();
        } else {
          finalizeRecording();
        }
      } catch {
        finalizeRecording();
      }
      await releaseWake();
    }

    function finalizeRecording() {
      try {
        const mimeType = mediaRecorder?.mimeType || "video/webm";
        const extension = mediaRecorder?._ext || (mimeType.includes("mp4") ? "mp4" : "webm");
        const blob = new Blob(chunks, { type: mimeType });
        const filename = "recording-" + new Date().toISOString().replace(/[:.]/g, "-") + "." + extension;

        if (blob.size > 0) {
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = filename;
          document.body.appendChild(a);
          a.click();
          a.remove();
          setStatus("Saved as " + filename);
          setTimeout(() => URL.revokeObjectURL(url), 5000);
        } else {
          setStatus("Nothing was saved. Browser returned an empty recording.", true);
        }
      } catch (err) {
        setStatus(err?.message || "Failed to save recording.", true);
      } finally {
        mediaRecorder = null;
        chunks = [];
        stopRequested = false;
        cleanupStream();
      }
    }

    function handleTripleTap() {
      if (!recording) return;
      tapCount += 1;
      clearTimeout(tapTimer);
      tapTimer = setTimeout(() => tapCount = 0, 700);
      if (tapCount >= 3) {
        tapCount = 0;
        clearTimeout(tapTimer);
        stopRecording();
      }
    }

    openSettingsBtn.addEventListener("click", () => settingsModal.classList.add("open"));
    saveSettingsBtn.addEventListener("click", () => {
      settings.quality = qualityEl.value;
      settings.fps = fpsEl.value;
      settings.cameraMode = cameraEl.value;
      settings.zoom = Number(zoomEl.value);
      settings.includeAudio = audioEl.checked;
      saveSettings();
      renderSettings();
      settingsModal.classList.remove("open");
    });

    settingsModal.addEventListener("click", (e) => {
      if (e.target === settingsModal) settingsModal.classList.remove("open");
    });

    zoomEl.addEventListener("input", () => {
      zoomValue.textContent = Number(zoomEl.value).toFixed(1);
    });

    startBtn.addEventListener("click", startRecording);
    blackscreen.addEventListener("click", handleTripleTap);

    document.addEventListener("visibilitychange", () => {
      if (document.hidden && recording) stopRecording();
    });

    window.addEventListener("pagehide", () => {
      if (recording) stopRecording();
    });

    renderSettings();
  </script>
</body>
</html>
